<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Library Book Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-top">
                <h1 class="logo">Discover <span>Books</span></h1>
                <!-- 5. Dark Mode / Light Mode toggle -->
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
                    🌙 Dark Mode
                </button>
            </div>
            <p class="subtitle">Search the Open Library for your next great read.</p>
            
            <div class="controls-container">
                <!-- 1. Real-time Searching -->
                <div class="search-input-wrapper">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <input type="text" id="search-input" placeholder="Search by title or author... (real-time typing)" autocomplete="off">
                </div>
                
                <div class="filters-row">
                    <!-- 3. Sorting options -->
                    <select id="sort-select" class="control-select">
                        <option value="default">Sort By: Default</option>
                        <option value="az">Alphabetical (A-Z)</option>
                        <option value="za">Alphabetical (Z-A)</option>
                        <option value="year-asc">Year (Oldest-Newest)</option>
                        <option value="year-desc">Year (Newest-Oldest)</option>
                    </select>

                    <!-- 2. Filtering options -->
                    <select id="filter-select" class="control-select">
                        <option value="all">Filter: All Categories</option>
                        <option value="classic">Classic (Before 2000)</option>
                        <option value="modern">Modern (2000 & After)</option>
                    </select>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div id="loading-spinner" class="spinner-container hidden">
                <div class="spinner"></div>
                <p>Loading dataset...</p>
            </div>

            <div id="results-grid" class="results-grid">
                <!-- Book cards will be dynamically injected here using map() and join() -->
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
